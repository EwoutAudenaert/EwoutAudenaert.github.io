<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skyjo-like Card Game</title>
  <style>
    :root {
      --bg: #151a2d;
      --panel: #202744;
      --panel2: #2c3558;
      --card: #f8f1dc;
      --back: #5666d6;
      --accent: #ffd166;
      --good: #60d394;
      --bad: #ef476f;
      --text: #f7f7ff;
      --muted: #aeb7d8;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
      --w: min(1180px, 98vw);
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #2e3b73 0, transparent 32%),
        radial-gradient(circle at bottom right, #42275f 0, transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    .game {
      width: var(--w);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 190px 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .player {
      background: rgba(32, 39, 68, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 12px;
      min-width: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .name {
      font-weight: 800;
      font-size: 18px;
    }

    .badge {
      background: var(--panel2);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .badge.active {
      background: var(--accent);
      color: #221900;
      animation: pulse 1s infinite alternate;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .card {
      height: clamp(58px, 10vw, 90px);
      border-radius: 13px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(22px, 4vw, 38px);
      font-weight: 900;
      color: #1a1a1a;
      background: var(--card);
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.22s ease,
        filter 0.18s ease;
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.22);
      border: 2px solid rgba(255, 255, 255, 0.45);
    }

    .card:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 13px 0 rgba(0, 0, 0, 0.2);
      z-index: 4;
    }

    .card.hidden {
      color: transparent;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.18) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(315deg, rgba(255,255,255,0.18) 25%, transparent 25%) 0 0 / 18px 18px,
        var(--back);
    }

    .card.hidden::after {
      content: "?";
      color: white;
      opacity: 0.9;
      font-size: 28px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.35);
    }

    .card.removed {
      opacity: 0.12;
      pointer-events: none;
      filter: grayscale(1);
      transform: scale(0.82);
      box-shadow: none;
    }

    .card.selected {
      outline: 4px solid var(--accent);
      animation: bounce 0.65s infinite alternate;
    }

    .card.negative {
      background: #b5f5d1;
    }

    .card.low {
      background: #d8f7c5;
    }

    .card.mid {
      background: #fff3bf;
    }

    .card.high {
      background: #ffb3b3;
    }

    .center {
      background: rgba(20, 26, 48, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .piles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pileWrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .pileLabel {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .pile {
      width: 78px;
      height: 108px;
      border-radius: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-weight: 900;
      font-size: 34px;
      box-shadow: 0 10px 0 rgba(0, 0, 0, 0.25);
      border: 2px solid rgba(255, 255, 255, 0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .pile:hover {
      transform: translateY(-6px) rotate(-2deg);
      box-shadow: 0 16px 0 rgba(0, 0, 0, 0.22);
    }

    .deck {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.18) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(315deg, rgba(255,255,255,0.18) 25%, transparent 25%) 0 0 / 18px 18px,
        #6977ff;
      color: white;
    }

    .discard {
      background: var(--card);
      color: #111;
    }

    .pile.usable {
      outline: 4px solid var(--accent);
      animation: glow 0.9s infinite alternate;
    }

    .drawn {
      height: 100px;
      border-radius: 16px;
      background: var(--panel2);
      border: 2px dashed rgba(255, 255, 255, 0.25);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: var(--muted);
      padding: 10px;
      font-size: 14px;
    }

    .drawn .miniCard {
      width: 70px;
      height: 92px;
      border-radius: 13px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--card);
      color: #111;
      font-size: 34px;
      font-weight: 900;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.25);
      cursor: pointer;
      animation: dealIn 0.28s ease both;
    }

    .status {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 10px;
      min-height: 76px;
      line-height: 1.35;
      font-size: 14px;
      color: #e8ecff;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: auto;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--accent);
      color: #221900;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .small {
      background: #3b466f;
      color: white;
    }

    .scoreLine {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .scoreLine strong {
      color: white;
    }

    .flash {
      animation: flash 0.45s ease;
    }

    .flip {
      animation: flip 0.38s ease;
    }

    .swap {
      animation: swap 0.35s ease;
    }

    .clear {
      animation: clear 0.55s ease forwards;
    }

    .shake {
      animation: shake 0.28s ease;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    @keyframes glow {
      from { box-shadow: 0 10px 0 rgba(0,0,0,0.25), 0 0 0 rgba(255,209,102,0); }
      to { box-shadow: 0 10px 0 rgba(0,0,0,0.25), 0 0 22px rgba(255,209,102,0.75); }
    }

    @keyframes bounce {
      from { transform: translateY(-3px); }
      to { transform: translateY(-9px); }
    }

    @keyframes dealIn {
      from { transform: translateY(-25px) scale(0.8) rotate(-8deg); opacity: 0; }
      to { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
    }

    @keyframes flip {
      0% { transform: rotateY(0) scale(1); }
      50% { transform: rotateY(90deg) scale(1.08); }
      100% { transform: rotateY(0) scale(1); }
    }

    @keyframes swap {
      0% { transform: scale(1) rotate(0); }
      50% { transform: scale(1.18) rotate(5deg); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes clear {
      0% { transform: scale(1); opacity: 1; }
      45% { transform: scale(1.18) rotate(5deg); opacity: 1; }
      100% { transform: scale(0.15) rotate(25deg); opacity: 0.12; }
    }

    @keyframes flash {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.8); }
      100% { filter: brightness(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @media (max-width: 850px) {
      body {
        align-items: flex-start;
      }

      .game {
        grid-template-columns: 1fr;
        padding: 8px;
      }

      .center {
        order: -1;
      }

      .piles {
        grid-template-columns: repeat(4, 1fr);
        align-items: end;
      }

      .pile {
        width: 68px;
        height: 92px;
        font-size: 28px;
      }

      .drawn {
        height: 92px;
        grid-column: span 2;
      }

      .board {
        gap: 6px;
      }

      .card {
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="player" id="humanPanel">
      <div class="header">
        <div class="name">Jij</div>
        <div class="badge" id="humanBadge">wachten</div>
      </div>
      <div class="board" id="humanBoard"></div>
    </section>

    <section class="center">
      <div class="piles">
        <div class="pileWrap">
          <div class="pileLabel">Trekstapel</div>
          <div class="pile deck" id="deckPile">★</div>
        </div>

        <div class="pileWrap">
          <div class="pileLabel">Afleg</div>
          <div class="pile discard" id="discardPile"></div>
        </div>

        <div class="drawn" id="drawnBox">Klik op de trekstapel of aflegstapel.</div>
      </div>

      <div class="scoreLine">
        <span>Jouw punten: <strong id="humanScore">0</strong></span>
        <span>AI punten: <strong id="aiScore">0</strong></span>
      </div>

      <div class="status" id="status"></div>

      <div class="buttons">
        <button id="newGameBtn">Nieuw spel</button>
        <button class="small" id="hintBtn">Hint</button>
      </div>
    </section>

    <section class="player" id="aiPanel">
      <div class="header">
        <div class="name">Computer</div>
        <div class="badge" id="aiBadge">wachten</div>
      </div>
      <div class="board" id="aiBoard"></div>
    </section>
  </main>

  <script>
    const humanBoard = document.getElementById("humanBoard");
    const aiBoard = document.getElementById("aiBoard");
    const deckPile = document.getElementById("deckPile");
    const discardPile = document.getElementById("discardPile");
    const drawnBox = document.getElementById("drawnBox");
    const statusBox = document.getElementById("status");
    const humanScoreEl = document.getElementById("humanScore");
    const aiScoreEl = document.getElementById("aiScore");
    const humanBadge = document.getElementById("humanBadge");
    const aiBadge = document.getElementById("aiBadge");
    const newGameBtn = document.getElementById("newGameBtn");
    const hintBtn = document.getElementById("hintBtn");

    let deck = [];
    let discard = [];
    let players = [];
    let current = 0;
    let phase = "choosePile";
    let drawnCard = null;
    let tookDiscard = false;
    let finalTurns = false;
    let finalStarter = null;
    let gameOver = false;

    function createDeck() {
      const values = [];
      addValues(values, -2, 5);
      addValues(values, -1, 10);
      addValues(values, 0, 15);
      for (let n = 1; n <= 12; n++) addValues(values, n, 10);
      return shuffle(values);
    }

    function addValues(arr, value, amount) {
      for (let i = 0; i < amount; i++) arr.push(value);
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startGame() {
      deck = createDeck();
      discard = [];
      players = [
        { name: "Jij", board: [], isAI: false },
        { name: "Computer", board: [], isAI: true }
      ];
      current = 0;
      phase = "choosePile";
      drawnCard = null;
      tookDiscard = false;
      finalTurns = false;
      finalStarter = null;
      gameOver = false;

      for (const p of players) {
        p.board = [];
        for (let i = 0; i < 12; i++) {
          p.board.push({
            value: deck.pop(),
            open: false,
            removed: false
          });
        }

        const first = Math.floor(Math.random() * 12);
        let second = Math.floor(Math.random() * 12);
        while (second === first) second = Math.floor(Math.random() * 12);

        p.board[first].open = true;
        p.board[second].open = true;
      }

      discard.push(deck.pop());
      log("Nieuw spel. Klik op de trekstapel of aflegstapel.");
      render();

      if (players[current].isAI) setTimeout(aiTurn, 700);
    }

    function render() {
      renderBoard(humanBoard, players[0], 0);
      renderBoard(aiBoard, players[1], 1);

      discardPile.textContent = topDiscard();
      discardPile.className = "pile discard " + valueClass(topDiscard());
      deckPile.textContent = deck.length ? "★" : "↻";

      deckPile.classList.toggle("usable", !gameOver && current === 0 && phase === "choosePile");
      discardPile.classList.toggle("usable", !gameOver && current === 0 && phase === "choosePile");

      humanBadge.textContent = current === 0 && !gameOver ? "aan zet" : "wachten";
      aiBadge.textContent = current === 1 && !gameOver ? "aan zet" : "wachten";
      humanBadge.classList.toggle("active", current === 0 && !gameOver);
      aiBadge.classList.toggle("active", current === 1 && !gameOver);

      humanScoreEl.textContent = visibleScore(players[0]);
      aiScoreEl.textContent = visibleScore(players[1]);

      if (drawnCard === null) {
        drawnBox.innerHTML = phase === "choosePile"
          ? "Klik rechtstreeks op een stapel."
          : "Kies een kaart.";
      } else {
        drawnBox.innerHTML = `<div class="miniCard ${valueClass(drawnCard)}" id="drawnMini">${drawnCard}</div>`;
        document.getElementById("drawnMini").onclick = discardDrawnCard;
      }
    }

    function renderBoard(root, player, playerIndex) {
      root.innerHTML = "";

      player.board.forEach((card, index) => {
        const el = document.createElement("div");
        el.className = "card";

        if (card.removed) {
          el.classList.add("removed");
          el.textContent = "";
        } else if (!card.open) {
          el.classList.add("hidden");
          el.textContent = "";
        } else {
          el.textContent = card.value;
          el.classList.add(valueClass(card.value));
        }

        if (
          playerIndex === current &&
          current === 0 &&
          !gameOver &&
          (phase === "replaceWithDrawn" || phase === "replaceWithDiscard" || phase === "revealAfterDiscard")
          && !card.removed
        ) {
          el.classList.add("selected");
        }

        el.onclick = () => handleCardClick(playerIndex, index, el);
        root.appendChild(el);
      });
    }

    function valueClass(v) {
      if (v < 0) return "negative";
      if (v <= 3) return "low";
      if (v <= 7) return "mid";
      return "high";
    }

    function topDiscard() {
      return discard[discard.length - 1];
    }

    function visibleScore(player) {
      return player.board.reduce((sum, c) => {
        if (c.open && !c.removed) return sum + c.value;
        return sum;
      }, 0);
    }

    function finalScore(player) {
      return player.board.reduce((sum, c) => {
        if (!c.removed) return sum + c.value;
        return sum;
      }, 0);
    }

    function log(text) {
      statusBox.textContent = text;
    }

    function drawFromDeck() {
      if (gameOver || current !== 0 || phase !== "choosePile") return shake(deckPile);

      if (!deck.length) recycleDiscard();

      drawnCard = deck.pop();
      tookDiscard = false;
      phase = "replaceWithDrawn";
      log(`Je trok ${drawnCard}. Klik op een kaart om te wisselen, of klik op de getrokken kaart om ze af te leggen.`);
      flash(deckPile);
      render();
    }

    function takeDiscard() {
      if (gameOver || current !== 0 || phase !== "choosePile") return shake(discardPile);

      drawnCard = discard.pop();
      tookDiscard = true;
      phase = "replaceWithDiscard";
      log(`Je neemt ${drawnCard} van de aflegstapel. Klik op een kaart om te wisselen.`);
      flash(discardPile);
      render();
    }

    function discardDrawnCard() {
      if (gameOver || current !== 0 || phase !== "replaceWithDrawn" || tookDiscard) return;

      discard.push(drawnCard);
      drawnCard = null;
      phase = "revealAfterDiscard";
      log("Kaart afgelegd. Klik nu op een gesloten kaart om ze open te draaien.");
      render();
    }

    function handleCardClick(playerIndex, index, el) {
      if (gameOver || playerIndex !== current || current !== 0) return;

      const card = players[0].board[index];
      if (card.removed) return shake(el);

      if (phase === "replaceWithDrawn" || phase === "replaceWithDiscard") {
        const old = card.value;
        card.value = drawnCard;
        card.open = true;
        discard.push(old);
        drawnCard = null;
        phase = "choosePile";
        animateCard(el, "swap");
        log(`Gewisseld. ${old} ligt nu op de aflegstapel.`);
        afterMove();
        return;
      }

      if (phase === "revealAfterDiscard") {
        if (card.open) return shake(el);
        card.open = true;
        animateCard(el, "flip");
        phase = "choosePile";
        log(`Je draaide ${card.value} open.`);
        afterMove();
        return;
      }

      shake(el);
    }

    function afterMove() {
      const player = players[current];

      setTimeout(() => {
        clearColumns(player);
        render();

        setTimeout(() => {
          if (allOpen(player) && !finalTurns) {
            finalTurns = true;
            finalStarter = current;
            log(`${player.name} heeft alles open. De andere speler krijgt nog één beurt.`);
          }

          if (finalTurns && current !== finalStarter) {
            endGame();
            return;
          }

          current = 1 - current;
          phase = "choosePile";
          drawnCard = null;
          tookDiscard = false;
          render();

          if (players[current].isAI && !gameOver) setTimeout(aiTurn, 800);
        }, 420);
      }, 260);
    }

    function clearColumns(player) {
      for (let col = 0; col < 4; col++) {
        const indexes = [col, col + 4, col + 8];
        const cards = indexes.map(i => player.board[i]);

        if (
          cards.every(c => c.open && !c.removed) &&
          cards[0].value === cards[1].value &&
          cards[1].value === cards[2].value
        ) {
          for (const i of indexes) {
            player.board[i].removed = true;
          }
          log(`Kolom met drie keer ${cards[0].value} verwijderd.`);
        }
      }
    }

    function allOpen(player) {
      return player.board.every(c => c.open || c.removed);
    }

    function aiTurn() {
      if (gameOver || current !== 1) return;

      const ai = players[1];
      const discardValue = topDiscard();
      const hidden = ai.board
        .map((c, i) => ({ c, i }))
        .filter(x => !x.c.open && !x.c.removed);

      const openCards = ai.board
        .map((c, i) => ({ c, i }))
        .filter(x => x.c.open && !x.c.removed)
        .sort((a, b) => b.c.value - a.c.value);

      if (discardValue <= 3 && openCards.length && openCards[0].c.value > discardValue) {
        drawnCard = discard.pop();
        const target = openCards[0].i;
        aiSwap(target);
        return;
      }

      if (discardValue <= 1 && hidden.length) {
        drawnCard = discard.pop();
        const target = hidden[Math.floor(Math.random() * hidden.length)].i;
        aiSwap(target);
        return;
      }

      if (!deck.length) recycleDiscard();

      const drawn = deck.pop();

      if (drawn <= 3) {
        drawnCard = drawn;
        const target = openCards.length && openCards[0].c.value > drawn
          ? openCards[0].i
          : hidden.length
            ? hidden[Math.floor(Math.random() * hidden.length)].i
            : openCards[0].i;
        aiSwap(target);
      } else {
        discard.push(drawn);
        if (hidden.length) {
          const target = hidden[Math.floor(Math.random() * hidden.length)].i;
          ai.board[target].open = true;
          log(`Computer trok blind, legde ${drawn} af en draaide een kaart open.`);
        } else {
          log(`Computer legde ${drawn} af.`);
        }
        afterMove();
      }
    }

    function aiSwap(index) {
      const ai = players[1];
      const old = ai.board[index].value;
      ai.board[index].value = drawnCard;
      ai.board[index].open = true;
      discard.push(old);

      log(`Computer wisselde een kaart en legde ${old} af.`);
      drawnCard = null;
      afterMove();
    }

    function recycleDiscard() {
      if (discard.length <= 1) return;

      const keep = discard.pop();
      deck = shuffle(discard);
      discard = [keep];
      log("Aflegstapel werd opnieuw geschud tot trekstapel.");
    }

    function endGame() {
      gameOver = true;

      for (const p of players) {
        p.board.forEach(c => {
          if (!c.removed) c.open = true;
        });
      }

      const human = finalScore(players[0]);
      const ai = finalScore(players[1]);

      let result = "Gelijkspel.";
      if (human < ai) result = "Jij wint.";
      if (ai < human) result = "Computer wint.";

      log(`Einde ronde. Jij: ${human} punten. Computer: ${ai} punten. ${result}`);
      render();
    }

    function flash(el) {
      el.classList.remove("flash");
      void el.offsetWidth;
      el.classList.add("flash");
    }

    function shake(el) {
      el.classList.remove("shake");
      void el.offsetWidth;
      el.classList.add("shake");
    }

    function animateCard(el, cls) {
      el.classList.remove(cls);
      void el.offsetWidth;
      el.classList.add(cls);
    }

    function giveHint() {
      if (gameOver) {
        log("Start een nieuw spel.");
        return;
      }

      if (current !== 0) {
        log("Computer is aan zet.");
        return;
      }

      if (phase === "choosePile") {
        const discardValue = topDiscard();
        if (discardValue <= 2) {
          log(`Hint: ${discardValue} is laag. Neem waarschijnlijk de aflegstapel.`);
        } else if (discardValue >= 8) {
          log(`Hint: ${discardValue} is hoog. Trek liever blind.`);
        } else {
          log(`Hint: ${discardValue} is middelmatig. Neem ze alleen als je een hoge open kaart kan vervangen.`);
        }
      } else if (phase === "replaceWithDrawn" || phase === "replaceWithDiscard") {
        log("Hint: vervang je hoogste open kaart. Heb je geen hoge open kaart, kies dan een gesloten kaart.");
      } else if (phase === "revealAfterDiscard") {
        log("Hint: draai een gesloten kaart open in een kolom waar nog weinig risico zit.");
      }
    }

    deckPile.onclick = drawFromDeck;
    discardPile.onclick = takeDiscard;
    newGameBtn.onclick = startGame;
    hintBtn.onclick = giveHint;

    startGame();
  </script>
</body>
</html>
