<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skyjo-like 4 Player Game</title>

  <style>
    :root {
      --bg: #11162a;
      --panel: rgba(31, 39, 70, 0.88);
      --panel2: #2a345b;
      --card: #fff2cf;
      --back1: #6878ff;
      --back2: #4454ce;
      --accent: #ffd166;
      --text: #f7f7ff;
      --muted: #b4bee2;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
      --w: min(1280px, 98vw);
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(88, 111, 255, 0.35) 0, transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 99, 146, 0.18) 0, transparent 34%),
        linear-gradient(135deg, #101528, #171d36);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .game {
      width: var(--w);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 210px 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .center {
      grid-column: 2;
      grid-row: 1 / span 2;
      background: rgba(17, 23, 45, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      backdrop-filter: blur(16px);
    }

    .player {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 12px;
      min-width: 0;
      backdrop-filter: blur(16px);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .player.activePanel {
      transform: translateY(-4px);
      box-shadow:
        var(--shadow),
        0 0 0 3px rgba(255, 209, 102, 0.85),
        0 0 34px rgba(255, 209, 102, 0.25);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .name {
      font-weight: 900;
      font-size: 17px;
      letter-spacing: 0.01em;
    }

    .badge {
      background: var(--panel2);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease;
    }

    .badge.active {
      background: var(--accent);
      color: #241900;
      animation: softPulse 1s infinite alternate;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      perspective: 1100px;
    }

    .card {
      height: clamp(48px, 7.5vw, 78px);
      border-radius: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(18px, 3vw, 31px);
      font-weight: 950;
      color: #181818;
      background: var(--card);
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition:
        transform 0.24s cubic-bezier(.2,.9,.25,1),
        box-shadow 0.24s ease,
        opacity 0.24s ease,
        filter 0.24s ease,
        outline-color 0.24s ease;
      box-shadow:
        0 7px 0 rgba(0, 0, 0, 0.24),
        0 12px 20px rgba(0, 0, 0, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.35), transparent 45%, rgba(0,0,0,0.08));
      opacity: 0.75;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.035) rotateZ(-0.7deg);
      box-shadow:
        0 13px 0 rgba(0, 0, 0, 0.20),
        0 20px 30px rgba(0, 0, 0, 0.22);
      z-index: 5;
    }

    .card.hidden {
      color: transparent;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,0.42) 0 4px, transparent 5px),
        radial-gradient(circle at 72% 78%, rgba(255,255,255,0.26) 0 5px, transparent 6px),
        linear-gradient(135deg, rgba(255,255,255,0.16) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(315deg, rgba(255,255,255,0.16) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(135deg, var(--back1), var(--back2));
    }

    .card.hidden::after {
      content: "?";
      color: white;
      opacity: 0.96;
      font-size: 28px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.38);
    }

    .card.removed {
      opacity: 0.12;
      pointer-events: none;
      filter: grayscale(1);
      transform: scale(0.82);
      box-shadow: none;
    }

    .card.selected {
      outline: 4px solid var(--accent);
      animation: floatSelect 0.9s ease-in-out infinite alternate;
    }

    .card.pickStart {
      outline: 4px solid rgba(96, 211, 148, 0.95);
      animation: pickGlow 1s ease-in-out infinite alternate;
    }

    .card.negative,
    .miniCard.negative,
    .flyingCard.negative {
      background: #b9f7d8;
    }

    .card.low,
    .miniCard.low,
    .flyingCard.low {
      background: #dff8c8;
    }

    .card.mid,
    .miniCard.mid,
    .flyingCard.mid {
      background: #fff1ad;
    }

    .card.high,
    .miniCard.high,
    .flyingCard.high {
      background: #ffb0b0;
    }

    .piles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pileWrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .pileLabel {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pile {
      width: 78px;
      height: 108px;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-weight: 950;
      font-size: 34px;
      box-shadow:
        0 10px 0 rgba(0, 0, 0, 0.25),
        0 18px 28px rgba(0, 0, 0, 0.22);
      border: 2px solid rgba(255, 255, 255, 0.4);
      transition: transform 0.24s cubic-bezier(.2,.9,.25,1), box-shadow 0.24s ease;
      position: relative;
      overflow: hidden;
    }

    .pile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.35), transparent 45%, rgba(0,0,0,0.12));
      pointer-events: none;
    }

    .pile:hover {
      transform: translateY(-7px) rotate(-2deg) scale(1.02);
      box-shadow:
        0 17px 0 rgba(0, 0, 0, 0.20),
        0 26px 36px rgba(0, 0, 0, 0.24);
    }

    .deck {
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,0.42) 0 4px, transparent 5px),
        radial-gradient(circle at 72% 78%, rgba(255,255,255,0.26) 0 5px, transparent 6px),
        linear-gradient(135deg, rgba(255,255,255,0.16) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(315deg, rgba(255,255,255,0.16) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(135deg, var(--back1), var(--back2));
      color: white;
    }

    .discard {
      background: var(--card);
      color: #111;
    }

    .pile.usable {
      outline: 4px solid var(--accent);
      animation: pileGlow 0.95s infinite alternate;
    }

    .drawn {
      height: 100px;
      border-radius: 18px;
      background: var(--panel2);
      border: 2px dashed rgba(255, 255, 255, 0.25);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: var(--muted);
      padding: 10px;
      font-size: 14px;
      grid-column: span 2;
    }

    .drawn .miniCard {
      width: 70px;
      height: 92px;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #111;
      font-size: 34px;
      font-weight: 950;
      box-shadow:
        0 8px 0 rgba(0, 0, 0, 0.25),
        0 18px 25px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      animation: dealIn 0.38s cubic-bezier(.2,.9,.25,1) both;
      border: 2px solid rgba(255,255,255,0.45);
    }

    .scoreGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .scoreGrid strong {
      color: white;
    }

    .status {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 10px;
      min-height: 100px;
      line-height: 1.35;
      font-size: 14px;
      color: #e8ecff;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: auto;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      background: var(--accent);
      color: #221900;
      font-weight: 950;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button:hover {
      transform: translateY(-3px);
      filter: brightness(1.05);
    }

    .small {
      background: #3b466f;
      color: white;
    }

    .flyingCard {
      position: fixed;
      z-index: 9999;
      width: 70px;
      height: 92px;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 34px;
      font-weight: 950;
      color: #111;
      background: var(--card);
      border: 2px solid rgba(255,255,255,0.55);
      box-shadow: 0 22px 45px rgba(0,0,0,0.42);
      pointer-events: none;
      will-change: transform, opacity;
    }

    .flyingCard.hiddenFly {
      color: white;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,0.42) 0 4px, transparent 5px),
        radial-gradient(circle at 72% 78%, rgba(255,255,255,0.26) 0 5px, transparent 6px),
        linear-gradient(135deg, rgba(255,255,255,0.16) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(315deg, rgba(255,255,255,0.16) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(135deg, var(--back1), var(--back2));
    }

    .shake {
      animation: shake 0.28s ease;
    }

    .pop {
      animation: pop 0.36s cubic-bezier(.2,.9,.25,1);
    }

    .flipSmooth {
      animation: flipSmooth 0.58s cubic-bezier(.2,.9,.25,1);
    }

    .clearAnim {
      animation: clearAnim 0.75s cubic-bezier(.2,.9,.25,1) forwards;
    }

    @keyframes softPulse {
      from { transform: scale(1); }
      to { transform: scale(1.055); }
    }

    @keyframes pileGlow {
      from {
        box-shadow:
          0 10px 0 rgba(0,0,0,0.25),
          0 18px 28px rgba(0,0,0,0.22),
          0 0 0 rgba(255,209,102,0);
      }
      to {
        box-shadow:
          0 10px 0 rgba(0,0,0,0.25),
          0 18px 28px rgba(0,0,0,0.22),
          0 0 28px rgba(255,209,102,0.78);
      }
    }

    @keyframes floatSelect {
      from { transform: translateY(-3px) scale(1.01); }
      to { transform: translateY(-10px) scale(1.035); }
    }

    @keyframes pickGlow {
      from {
        transform: translateY(0) scale(1);
        box-shadow:
          0 8px 0 rgba(0, 0, 0, 0.24),
          0 14px 22px rgba(0, 0, 0, 0.18),
          0 0 0 rgba(96,211,148,0);
      }
      to {
        transform: translateY(-7px) scale(1.035);
        box-shadow:
          0 14px 0 rgba(0, 0, 0, 0.20),
          0 22px 32px rgba(0, 0, 0, 0.22),
          0 0 26px rgba(96,211,148,0.55);
      }
    }

    @keyframes dealIn {
      from {
        transform: translateY(-28px) scale(0.78) rotate(-8deg);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1) rotate(0);
        opacity: 1;
      }
    }

    @keyframes flipSmooth {
      0% { transform: rotateY(0) scale(1); }
      45% { transform: rotateY(92deg) scale(1.09); }
      100% { transform: rotateY(0) scale(1); }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      45% { transform: scale(1.16) rotate(2deg); }
      100% { transform: scale(1); }
    }

    @keyframes clearAnim {
      0% { transform: scale(1); opacity: 1; filter: brightness(1); }
      35% { transform: translateY(-8px) scale(1.16) rotate(3deg); opacity: 1; filter: brightness(1.55); }
      100% { transform: translateY(18px) scale(0.18) rotate(24deg); opacity: 0.12; filter: brightness(0.7) grayscale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @media (max-width: 1000px) {
      body {
        align-items: flex-start;
        overflow-y: auto;
      }

      .game {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        padding: 8px;
      }

      .center {
        grid-column: auto;
        grid-row: auto;
        order: -1;
      }

      .piles {
        grid-template-columns: repeat(2, 1fr);
        align-items: end;
      }

      .pile {
        width: 68px;
        height: 92px;
        font-size: 28px;
      }

      .drawn {
        height: 88px;
      }

      .drawn .miniCard {
        width: 58px;
        height: 76px;
        font-size: 28px;
      }

      .board {
        gap: 6px;
      }

      .card {
        height: 58px;
      }
    }
  </style>
</head>

<body>
  <main class="game">
    <section class="player" id="player0Panel">
      <div class="header">
        <div class="name">Jij</div>
        <div class="badge" id="player0Badge">startkeuze</div>
      </div>
      <div class="board" id="player0Board"></div>
    </section>

    <section class="center">
      <div class="piles">
        <div class="pileWrap">
          <div class="pileLabel">Trekstapel</div>
          <div class="pile deck" id="deckPile">★</div>
        </div>

        <div class="pileWrap">
          <div class="pileLabel">Afleg</div>
          <div class="pile discard" id="discardPile"></div>
        </div>

        <div class="drawn" id="drawnBox">Kies eerst twee eigen kaarten om open te draaien.</div>
      </div>

      <div class="scoreGrid">
        <span>Jij: <strong id="score0">0</strong></span>
        <span>AI 1: <strong id="score1">0</strong></span>
        <span>AI 2: <strong id="score2">0</strong></span>
        <span>AI 3: <strong id="score3">0</strong></span>
      </div>

      <div class="status" id="status"></div>

      <div class="buttons">
        <button id="newGameBtn">Nieuw spel</button>
        <button class="small" id="hintBtn">Hint</button>
      </div>
    </section>

    <section class="player" id="player1Panel">
      <div class="header">
        <div class="name">AI 1</div>
        <div class="badge" id="player1Badge">wachten</div>
      </div>
      <div class="board" id="player1Board"></div>
    </section>

    <section class="player" id="player2Panel">
      <div class="header">
        <div class="name">AI 2</div>
        <div class="badge" id="player2Badge">wachten</div>
      </div>
      <div class="board" id="player2Board"></div>
    </section>

    <section class="player" id="player3Panel">
      <div class="header">
        <div class="name">AI 3</div>
        <div class="badge" id="player3Badge">wachten</div>
      </div>
      <div class="board" id="player3Board"></div>
    </section>
  </main>

  <script>
    const PLAYER_COUNT = 4;

    const deckPile = document.getElementById("deckPile");
    const discardPile = document.getElementById("discardPile");
    const drawnBox = document.getElementById("drawnBox");
    const statusBox = document.getElementById("status");
    const newGameBtn = document.getElementById("newGameBtn");
    const hintBtn = document.getElementById("hintBtn");

    const panels = [];
    const boards = [];
    const badges = [];
    const scoreEls = [];

    for (let i = 0; i < PLAYER_COUNT; i++) {
      panels[i] = document.getElementById(`player${i}Panel`);
      boards[i] = document.getElementById(`player${i}Board`);
      badges[i] = document.getElementById(`player${i}Badge`);
      scoreEls[i] = document.getElementById(`score${i}`);
    }

    let deck = [];
    let discard = [];
    let players = [];
    let current = 0;
    let phase = "initialReveal";
    let initialPicks = 0;
    let drawnCard = null;
    let tookDiscard = false;
    let finalTurns = false;
    let finalStarter = null;
    let finalTurnsLeft = 0;
    let gameOver = false;
    let locked = false;

    function createDeck() {
      const values = [];

      addValues(values, -2, 5);
      addValues(values, -1, 10);
      addValues(values, 0, 15);

      for (let n = 1; n <= 12; n++) {
        addValues(values, n, 10);
      }

      return shuffle(values);
    }

    function addValues(arr, value, amount) {
      for (let i = 0; i < amount; i++) arr.push(value);
    }

    function shuffle(arr) {
      const copy = [...arr];

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    function startGame() {
      deck = createDeck();
      discard = [];

      players = [
        { name: "Jij", short: "Jij", board: [], isAI: false },
        { name: "AI 1", short: "AI 1", board: [], isAI: true },
        { name: "AI 2", short: "AI 2", board: [], isAI: true },
        { name: "AI 3", short: "AI 3", board: [], isAI: true }
      ];

      current = 0;
      phase = "initialReveal";
      initialPicks = 0;
      drawnCard = null;
      tookDiscard = false;
      finalTurns = false;
      finalStarter = null;
      finalTurnsLeft = 0;
      gameOver = false;
      locked = false;

      for (const p of players) {
        p.board = [];

        for (let i = 0; i < 12; i++) {
          p.board.push({
            value: deck.pop(),
            open: false,
            removed: false
          });
        }
      }

      for (let i = 1; i < PLAYER_COUNT; i++) {
        revealRandomStartCards(i);
      }

      discard.push(deck.pop());

      log("Kies zelf twee kaarten aan jouw kant om open te draaien.");
      render();
    }

    function revealRandomStartCards(playerIndex) {
      const first = Math.floor(Math.random() * 12);
      let second = Math.floor(Math.random() * 12);

      while (second === first) {
        second = Math.floor(Math.random() * 12);
      }

      players[playerIndex].board[first].open = true;
      players[playerIndex].board[second].open = true;
    }

    function render() {
      for (let i = 0; i < PLAYER_COUNT; i++) {
        renderBoard(boards[i], players[i], i);
      }

      discardPile.textContent = topDiscard();
      discardPile.className = "pile discard " + valueClass(topDiscard());
      deckPile.textContent = deck.length ? "★" : "↻";

      for (let i = 0; i < PLAYER_COUNT; i++) {
        const isActive =
          !gameOver &&
          (
            phase === "initialReveal" && i === 0 ||
            phase !== "initialReveal" && current === i
          );

        panels[i].classList.toggle("activePanel", isActive);

        badges[i].textContent = getBadgeText(i);
        badges[i].classList.toggle("active", isActive);

        scoreEls[i].textContent = visibleScore(players[i]);
      }

      deckPile.classList.toggle("usable", !gameOver && !locked && current === 0 && phase === "choosePile");
      discardPile.classList.toggle("usable", !gameOver && !locked && current === 0 && phase === "choosePile");

      if (drawnCard === null) {
        if (phase === "initialReveal") {
          drawnBox.textContent = `Kies nog ${2 - initialPicks} kaart${2 - initialPicks === 1 ? "" : "en"}.`;
        } else if (phase === "choosePile") {
          drawnBox.textContent = current === 0
            ? "Klik op de trekstapel of aflegstapel."
            : `${players[current].name} denkt na...`;
        } else if (phase === "revealAfterDiscard") {
          drawnBox.textContent = "Kies een gesloten kaart om open te draaien.";
        } else if (phase === "aiThinking") {
          drawnBox.textContent = `${players[current].name} denkt na...`;
        } else {
          drawnBox.textContent = "Kies een kaart.";
        }
      } else {
        drawnBox.innerHTML = `<div class="miniCard ${valueClass(drawnCard)}" id="drawnMini">${drawnCard}</div>`;
        const mini = document.getElementById("drawnMini");
        if (mini) mini.onclick = discardDrawnCard;
      }
    }

    function getBadgeText(i) {
      if (gameOver) return "einde";

      if (phase === "initialReveal") {
        return i === 0 ? `${initialPicks}/2 gekozen` : "startkaarten";
      }

      if (current === i) return "aan zet";
      return "wachten";
    }

    function renderBoard(root, player, playerIndex) {
      root.innerHTML = "";

      player.board.forEach((card, index) => {
        const el = document.createElement("div");
        el.className = "card";
        el.dataset.playerIndex = playerIndex;
        el.dataset.cardIndex = index;

        if (card.removed) {
          el.classList.add("removed");
          el.textContent = "";
        } else if (!card.open) {
          el.classList.add("hidden");
          el.textContent = "";
        } else {
          el.textContent = card.value;
          el.classList.add(valueClass(card.value));
        }

        if (
          playerIndex === 0 &&
          phase === "initialReveal" &&
          !card.open &&
          !card.removed &&
          !locked
        ) {
          el.classList.add("pickStart");
        }

        if (
          playerIndex === current &&
          current === 0 &&
          !gameOver &&
          !locked &&
          (
            phase === "replaceWithDrawn" ||
            phase === "replaceWithDiscard" ||
            phase === "revealAfterDiscard"
          ) &&
          !card.removed
        ) {
          el.classList.add("selected");
        }

        el.onclick = () => handleCardClick(playerIndex, index, el);
        root.appendChild(el);
      });
    }

    function valueClass(v) {
      if (v < 0) return "negative";
      if (v <= 3) return "low";
      if (v <= 7) return "mid";
      return "high";
    }

    function topDiscard() {
      return discard[discard.length - 1];
    }

    function visibleScore(player) {
      return player.board.reduce((sum, c) => {
        if (c.open && !c.removed) return sum + c.value;
        return sum;
      }, 0);
    }

    function finalScore(player) {
      return player.board.reduce((sum, c) => {
        if (!c.removed) return sum + c.value;
        return sum;
      }, 0);
    }

    function log(text) {
      statusBox.textContent = text;
    }

    function drawFromDeck() {
      if (locked || gameOver || current !== 0 || phase !== "choosePile") {
        return shake(deckPile);
      }

      if (!deck.length) {
        recycleDiscard();
      }

      drawnCard = deck.pop();
      tookDiscard = false;
      phase = "replaceWithDrawn";

      animateFromTo({
        fromEl: deckPile,
        toEl: drawnBox,
        value: drawnCard,
        hidden: true,
        revealAtEnd: true,
        onDone: () => {
          log(`Je trok ${drawnCard}. Klik op een kaart om te wisselen, of klik op de getrokken kaart om ze af te leggen.`);
          render();
        }
      });
    }

    function takeDiscard() {
      if (locked || gameOver || current !== 0 || phase !== "choosePile") {
        return shake(discardPile);
      }

      drawnCard = discard.pop();
      tookDiscard = true;
      phase = "replaceWithDiscard";

      animateFromTo({
        fromEl: discardPile,
        toEl: drawnBox,
        value: drawnCard,
        onDone: () => {
          log(`Je neemt ${drawnCard} van de aflegstapel. Klik op een kaart om te wisselen.`);
          render();
        }
      });
    }

    function discardDrawnCard() {
      if (locked || gameOver || current !== 0 || phase !== "replaceWithDrawn" || tookDiscard) {
        return;
      }

      const value = drawnCard;
      const source = document.getElementById("drawnMini");

      discard.push(value);
      drawnCard = null;
      phase = "revealAfterDiscard";

      animateFromTo({
        fromEl: source,
        toEl: discardPile,
        value,
        fadeOut: true,
        onDone: () => {
          log("Kaart afgelegd. Klik nu op een gesloten kaart om ze open te draaien.");
          render();
        }
      });
    }

    function handleCardClick(playerIndex, index, el) {
      if (locked || gameOver) return;

      if (phase === "initialReveal") {
        if (playerIndex !== 0) return shake(el);

        const card = players[0].board[index];
        if (card.open || card.removed) return shake(el);

        card.open = true;
        initialPicks++;

        flipCard(el, () => {
          log(`Je draaide ${card.value} open. ${initialPicks < 2 ? "Kies nog één kaart." : "Het spel start nu."}`);
          render();

          if (initialPicks >= 2) {
            phase = "choosePile";
            current = 0;

            setTimeout(() => {
              log("Jij begint. Klik op de trekstapel of aflegstapel.");
              render();
            }, 450);
          }
        });

        return;
      }

      if (playerIndex !== current || current !== 0) return;

      const card = players[0].board[index];

      if (card.removed) {
        return shake(el);
      }

      if (phase === "replaceWithDrawn" || phase === "replaceWithDiscard") {
        const old = card.value;
        const incoming = drawnCard;

        card.value = incoming;
        card.open = true;

        discard.push(old);
        drawnCard = null;
        phase = "choosePile";

        animateFromTo({
          fromEl: drawnBox,
          toEl: el,
          value: incoming,
          onMid: () => render(),
          onDone: () => {
            popCard(getCardElement(0, index));

            animateFromTo({
              fromEl: getCardElement(0, index),
              toEl: discardPile,
              value: old,
              fadeOut: true,
              onDone: () => {
                log(`Gewisseld. ${old} ligt nu op de aflegstapel.`);
                afterMove();
              }
            });
          }
        });

        return;
      }

      if (phase === "revealAfterDiscard") {
        if (card.open) {
          return shake(el);
        }

        card.open = true;

        flipCard(el, () => {
          phase = "choosePile";
          log(`Je draaide ${card.value} open.`);
          afterMove();
        });

        return;
      }

      shake(el);
    }

    function afterMove() {
      const player = players[current];

      setTimeout(() => {
        const cleared = clearColumns(player);
        render();

        if (cleared.length) {
          for (const i of cleared) {
            const el = getCardElement(current, i);
            if (el) el.classList.add("clearAnim");
          }
        }

        setTimeout(() => {
          if (allOpen(player) && !finalTurns) {
            finalTurns = true;
            finalStarter = current;
            finalTurnsLeft = PLAYER_COUNT - 1;
            log(`${player.name} heeft alles open. Elke andere speler krijgt nog één beurt.`);
          }

          if (finalTurns && current !== finalStarter) {
            finalTurnsLeft--;

            if (finalTurnsLeft <= 0) {
              endGame();
              return;
            }
          }

          current = nextPlayer(current);
          phase = "choosePile";
          drawnCard = null;
          tookDiscard = false;
          render();

          if (players[current].isAI && !gameOver) {
            setTimeout(aiTurn, 850);
          }
        }, cleared.length ? 760 : 360);
      }, 240);
    }

    function nextPlayer(index) {
      return (index + 1) % PLAYER_COUNT;
    }

    function clearColumns(player) {
      const removedIndexes = [];

      for (let col = 0; col < 4; col++) {
        const indexes = [col, col + 4, col + 8];
        const cards = indexes.map(i => player.board[i]);

        if (
          cards.every(c => c.open && !c.removed) &&
          cards[0].value === cards[1].value &&
          cards[1].value === cards[2].value
        ) {
          for (const i of indexes) {
            player.board[i].removed = true;
            removedIndexes.push(i);
          }

          log(`${player.name} verwijderde een kolom met drie keer ${cards[0].value}.`);
        }
      }

      return removedIndexes;
    }

    function allOpen(player) {
      return player.board.every(c => c.open || c.removed);
    }

    function aiTurn() {
      if (locked || gameOver || current === 0) return;

      phase = "aiThinking";
      render();

      const aiIndex = current;
      const ai = players[aiIndex];
      const discardValue = topDiscard();

      const hidden = ai.board
        .map((c, i) => ({ c, i }))
        .filter(x => !x.c.open && !x.c.removed);

      const openCards = ai.board
        .map((c, i) => ({ c, i }))
        .filter(x => x.c.open && !x.c.removed)
        .sort((a, b) => b.c.value - a.c.value);

      setTimeout(() => {
        if (discardValue <= 3 && openCards.length && openCards[0].c.value > discardValue) {
          drawnCard = discard.pop();

          animateFromTo({
            fromEl: discardPile,
            toEl: getCardElement(aiIndex, openCards[0].i),
            value: drawnCard,
            onDone: () => aiSwap(aiIndex, openCards[0].i)
          });

          return;
        }

        if (discardValue <= 1 && hidden.length) {
          const target = hidden[Math.floor(Math.random() * hidden.length)].i;
          drawnCard = discard.pop();

          animateFromTo({
            fromEl: discardPile,
            toEl: getCardElement(aiIndex, target),
            value: drawnCard,
            onDone: () => aiSwap(aiIndex, target)
          });

          return;
        }

        if (!deck.length) {
          recycleDiscard();
        }

        const drawn = deck.pop();

        animateFromTo({
          fromEl: deckPile,
          toEl: drawnBox,
          value: drawn,
          hidden: true,
          revealAtEnd: true,
          onDone: () => {
            if (drawn <= 3) {
              drawnCard = drawn;

              const target = openCards.length && openCards[0].c.value > drawn
                ? openCards[0].i
                : hidden.length
                  ? hidden[Math.floor(Math.random() * hidden.length)].i
                  : openCards[0].i;

              animateFromTo({
                fromEl: drawnBox,
                toEl: getCardElement(aiIndex, target),
                value: drawnCard,
                onDone: () => aiSwap(aiIndex, target)
              });
            } else {
              discard.push(drawn);

              animateFromTo({
                fromEl: drawnBox,
                toEl: discardPile,
                value: drawn,
                fadeOut: true,
                onDone: () => {
                  if (hidden.length) {
                    const target = hidden[Math.floor(Math.random() * hidden.length)].i;
                    ai.board[target].open = true;

                    const targetEl = getCardElement(aiIndex, target);
                    flipCard(targetEl, () => {
                      log(`${ai.name} trok blind, legde ${drawn} af en draaide een kaart open.`);
                      afterMove();
                    });
                  } else {
                    log(`${ai.name} legde ${drawn} af.`);
                    afterMove();
                  }
                }
              });
            }
          }
        });
      }, 450);
    }

    function aiSwap(playerIndex, index) {
      const ai = players[playerIndex];
      const old = ai.board[index].value;
      const incoming = drawnCard;

      ai.board[index].value = incoming;
      ai.board[index].open = true;

      discard.push(old);
      drawnCard = null;
      phase = "choosePile";

      render();
      popCard(getCardElement(playerIndex, index));

      animateFromTo({
        fromEl: getCardElement(playerIndex, index),
        toEl: discardPile,
        value: old,
        fadeOut: true,
        onDone: () => {
          log(`${ai.name} wisselde een kaart en legde ${old} af.`);
          afterMove();
        }
      });
    }

    function recycleDiscard() {
      if (discard.length <= 1) return;

      const keep = discard.pop();
      deck = shuffle(discard);
      discard = [keep];

      log("Aflegstapel werd opnieuw geschud tot trekstapel.");
    }

    function endGame() {
      gameOver = true;

      for (const p of players) {
        p.board.forEach(c => {
          if (!c.removed) c.open = true;
        });
      }

      const scores = players.map(finalScore);
      const min = Math.min(...scores);
      const winners = players
        .map((p, i) => ({ name: p.name, score: scores[i] }))
        .filter(p => p.score === min)
        .map(p => p.name);

      const scoreText = players
        .map((p, i) => `${p.name}: ${scores[i]}`)
        .join(" | ");

      const result = winners.length === 1
        ? `${winners[0]} wint.`
        : `Gelijkspel tussen ${winners.join(" en ")}.`;

      log(`Einde ronde. ${scoreText}. ${result}`);
      render();
    }

    function getCardElement(playerIndex, cardIndex) {
      return document.querySelector(`[data-player-index="${playerIndex}"][data-card-index="${cardIndex}"]`);
    }

    function animateFromTo(options) {
      const {
        fromEl,
        toEl,
        value,
        hidden = false,
        revealAtEnd = false,
        fadeOut = false,
        onMid,
        onDone
      } = options;

      if (!fromEl || !toEl) {
        if (onDone) onDone();
        return;
      }

      locked = true;

      const from = fromEl.getBoundingClientRect();
      const to = toEl.getBoundingClientRect();

      const flying = document.createElement("div");
      flying.className = "flyingCard " + (hidden ? "hiddenFly" : valueClass(value));
      flying.textContent = hidden ? "★" : value;

      const startX = from.left + from.width / 2 - 35;
      const startY = from.top + from.height / 2 - 46;
      const endX = to.left + to.width / 2 - 35;
      const endY = to.top + to.height / 2 - 46;

      flying.style.left = `${startX}px`;
      flying.style.top = `${startY}px`;

      document.body.appendChild(flying);

      const dx = endX - startX;
      const dy = endY - startY;
      const arc = Math.min(-55, -Math.abs(dx) * 0.08 - 28);
      const rotateA = dx > 0 ? 8 : -8;
      const rotateB = dx > 0 ? -5 : 5;

      const animation = flying.animate(
        [
          {
            transform: "translate(0, 0) scale(0.94) rotate(0deg)",
            opacity: 0.96,
            offset: 0
          },
          {
            transform: `translate(${dx * 0.52}px, ${dy * 0.52 + arc}px) scale(1.12) rotate(${rotateA}deg)`,
            opacity: 1,
            offset: 0.55
          },
          {
            transform: `translate(${dx}px, ${dy}px) scale(${fadeOut ? 0.88 : 1.02}) rotate(${rotateB}deg)`,
            opacity: fadeOut ? 0.18 : 1,
            offset: 1
          }
        ],
        {
          duration: 680,
          easing: "cubic-bezier(.18,.82,.22,1)",
          fill: "forwards"
        }
      );

      if (revealAtEnd) {
        setTimeout(() => {
          flying.className = "flyingCard " + valueClass(value);
          flying.textContent = value;
        }, 455);
      }

      if (onMid) {
        setTimeout(onMid, 430);
      }

      animation.onfinish = () => {
        flying.remove();
        locked = false;

        if (onDone) onDone();
      };
    }

    function flipCard(el, callback) {
      if (!el) {
        if (callback) callback();
        return;
      }

      locked = true;
      el.classList.remove("flipSmooth");
      void el.offsetWidth;
      el.classList.add("flipSmooth");

      setTimeout(() => {
        locked = false;
        if (callback) callback();
      }, 560);
    }

    function popCard(el) {
      if (!el) return;

      el.classList.remove("pop");
      void el.offsetWidth;
      el.classList.add("pop");
    }

    function shake(el) {
      el.classList.remove("shake");
      void el.offsetWidth;
      el.classList.add("shake");
    }

    function giveHint() {
      if (gameOver) {
        log("Start een nieuw spel.");
        return;
      }

      if (phase === "initialReveal") {
        log("Hint: kies twee kaarten verspreid over verschillende kolommen. Zo krijg je meer informatie.");
        return;
      }

      if (current !== 0) {
        log(`${players[current].name} is aan zet.`);
        return;
      }

      if (phase === "choosePile") {
        const discardValue = topDiscard();

        if (discardValue <= 2) {
          log(`Hint: ${discardValue} is laag. Neem waarschijnlijk de aflegstapel.`);
        } else if (discardValue >= 8) {
          log(`Hint: ${discardValue} is hoog. Trek liever blind.`);
        } else {
          log(`Hint: ${discardValue} is middelmatig. Neem ze alleen als je een hoge open kaart kan vervangen.`);
        }
      } else if (phase === "replaceWithDrawn" || phase === "replaceWithDiscard") {
        log("Hint: vervang je hoogste open kaart. Heb je geen hoge open kaart, kies dan een gesloten kaart.");
      } else if (phase === "revealAfterDiscard") {
        log("Hint: draai een gesloten kaart open in een kolom waar nog weinig risico zit.");
      }
    }

    deckPile.onclick = drawFromDeck;
    discardPile.onclick = takeDiscard;
    newGameBtn.onclick = startGame;
    hintBtn.onclick = giveHint;

    startGame();
  </script>
</body>
</html>
